
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Meowl Dice 🎲</title>

<link rel="icon" type="image/x-icon" href="/images/favicon.ico">
<link rel="icon" type="image/png" sizes="256x256" href="/images/favicon.png">
<link rel="apple-touch-icon" href="/images/favicon.png">

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Luckiest+Guy&display=swap" rel="stylesheet">

<style>

body{
    margin:0;
    padding:20px;

    font-family:'Luckiest Guy',cursive;

    background-color:var(--theme-bg, #0b0b0b);
    background-image:url('/images/meowl-transparent-backround.png');
    background-size:cover;
    background-position:center;
    background-repeat:no-repeat;
    background-attachment:fixed;

    transition:background-color 0.4s ease;

    display:flex;
    justify-content:center;
    align-items:center;

    min-height:100vh;

    color:#fff;
    -webkit-text-stroke:1px #000;
    paint-order:stroke fill;
}

.container{
    width:100%;
    max-width:950px;

    text-align:center;
}

h1{
    font-size:3rem;
    margin-bottom:10px;
}

.subtext{
    font-size:1.35rem;

    margin-bottom:20px;

    color:#fff;
    -webkit-text-stroke:1px #000;
    paint-order:stroke fill;
}

.section-title{
    font-weight:bold;
    margin-bottom:12px;
}

/*
==================================================
POSSIBLE COLORS
==================================================
*/

.colors{
    display:flex;
    justify-content:center;
    flex-wrap:wrap;

    gap:12px;

    margin-bottom:35px;
}

.colors span{

    padding:8px 14px;

    border-radius:999px;

    background:white;

    font-weight:bold;

    -webkit-text-stroke:0;

    box-shadow:
        0 4px 10px rgba(0,0,0,0.08);
}

.red{color:red;}
.orange{color:orange;}
.yellow{color:#ffff00;}
.green{color:green;}
.blue{color:#0077ff;}
.purple{color:purple;}

/*
==================================================
DICE ROW
==================================================
*/

.dice-grid{

    display:flex;

    justify-content:center;

    gap:18px;

    margin-bottom:35px;

    flex-wrap:nowrap;
}

/*
==================================================
DICE
==================================================
*/

.die{

    width:120px;
    height:120px;

    border-radius:22px;

    border:10px solid white;

    background:white;

    display:flex;

    justify-content:center;
    align-items:center;

    box-shadow:
        0 10px 20px rgba(0,0,0,0.15);

    transition:
        background 0.08s linear,
        transform 0.08s linear;
}

/*
==================================================
CENTER WHITE DOT
==================================================
*/

.center-dot{

    width:32px;
    height:32px;

    border-radius:50%;

    background:white;

    box-shadow:
        0 0 10px rgba(255,255,255,0.95);
}

/*
==================================================
BUTTON
==================================================
*/

#rollBtn{

    padding:14px 34px;

    font-family:'Luckiest Guy',cursive;
    font-size:1.1rem;
    font-weight:bold;

    border:none;

    border-radius:12px;

    cursor:pointer;

    background:#1f7cff;

    color:white;

    -webkit-text-stroke:0;

    transition:0.2s;
}

#rollBtn:hover{
    transform:scale(1.05);
}

.logo{
    max-width:400px;
    width:100%;
    height:auto;
    margin-bottom:10px;
}

footer{
    margin-top:40px;
    font-size:0.9rem;

    color:#fff;
    -webkit-text-stroke:1px #000;
    paint-order:stroke fill;
}

/*
==================================================
MOBILE
==================================================
*/

@media(max-width:700px){

    .dice-grid{
        flex-wrap:wrap;
    }

    .die{
        width:100px;
        height:100px;
    }
}

@keyframes luckyPulse{
    0%,100%{transform:scale(1);}
    50%{transform:scale(1.15);}
}

@keyframes luckyPopIn{
    0%{transform:scale(0);opacity:0;}
    60%{transform:scale(1.2);opacity:1;}
    80%{transform:scale(0.9);}
    100%{transform:scale(1);opacity:1;}
}

#infoSection{
    transition:opacity 0.3s ease;
}

#infoSection.hidden{
    display:none;
}

#luckyBannerTop{
    display:none;
    font-size:3.5rem;
    color:#ffd700;
    -webkit-text-stroke:2px #b8860b;
    paint-order:stroke fill;
    text-shadow:
        0 0 16px rgba(255,215,0,0.8),
        0 0 32px rgba(255,215,0,0.5),
        0 0 48px rgba(255,215,0,0.3);
    animation:luckyPopIn 0.5s ease-out forwards, luckyPulse 0.8s ease-in-out 0.5s infinite;
    margin-bottom:20px;
    padding:20px 0;
}

.theme-switcher{
    margin-bottom:25px;
    display:flex;
    justify-content:center;
    align-items:center;
    gap:12px;
}

.theme-switcher .section-title{
    margin-bottom:0;
}

#themeSelect{
    font-family:'Luckiest Guy',cursive;
    font-size:1rem;
    padding:8px 14px;
    border-radius:10px;
    border:2px solid rgba(255,255,255,0.5);
    background:#222;
    color:#fff;
    cursor:pointer;
    outline:none;
    transition:border-color 0.2s;
}

#themeSelect:hover,
#themeSelect:focus{
    border-color:#fff;
}

#themeSelect option{
    background:#222;
    color:#fff;
}

</style>
</head>

<body>

<div class="container">

    <img src="/images/Meowl-Dice-Logo.png" alt="Meowl Dice" class="logo">

    <div id="infoSection">

    <div class="theme-switcher">
        <div class="section-title">Background Theme</div>
        <select id="themeSelect">
            <option value="black">Black</option>
            <option value="blue">Blue</option>
            <option value="green">Green</option>
            <option value="red">Red</option>
            <option value="bronze">Bronze</option>
            <option value="silver">Silver</option>
            <option value="gold">Gold</option>
        </select>
    </div>

    <div class="subtext">
        4 Color Dice • Secure Random Rolls
    </div>

    <div class="section-title">
        Possible Colors
    </div>

    <div class="colors">

        <span class="red">Red</span>

        <span class="orange">Orange</span>

        <span class="yellow">Yellow</span>

        <span class="green">Green</span>

        <span class="blue">Blue</span>

        <span class="purple">Purple</span>

    </div>
    </div>

    <div id="luckyBannerTop">🍀 Lucky Roll! 🍀</div>

    <div class="dice-grid">

        <div class="die" id="die1">
            <div class="center-dot"></div>
        </div>

        <div class="die" id="die2">
            <div class="center-dot"></div>
        </div>

        <div class="die" id="die3">
            <div class="center-dot"></div>
        </div>

        <div class="die" id="die4">
            <div class="center-dot"></div>
        </div>

    </div>

    <button id="rollBtn">
        ROLL 🎲
    </button>

    <div id="luckyBanner" style="
        display:none;
        margin-top:18px;
        font-size:2rem;
        color:#ffd700;
        -webkit-text-stroke:1.5px #b8860b;
        paint-order:stroke fill;
        text-shadow:0 0 12px rgba(255,215,0,0.7),0 0 24px rgba(255,215,0,0.4);
        animation:luckyPulse 0.6s ease-in-out 3;
    ">🍀 Lucky Roll! 🍀</div>

    <footer>© 2026 MEOWL-DICE.COM</footer>

</div>

<script>
(function(){
    var dieIds = ['die1','die2','die3','die4'];
    var dice = dieIds.map(function(id){ return document.getElementById(id); });
    var rollBtn = document.getElementById('rollBtn');
    var luckyBanner = document.getElementById('luckyBanner');
    var luckyBannerTop = document.getElementById('luckyBannerTop');
    var infoSection = document.getElementById('infoSection');
    var rollSound = new Audio('/audio/roll.ogg');
    var successSound = new Audio('/audio/success.ogg');
    var luckyRollSound = new Audio('/audio/luckyroll.mp3');
    rollSound.volume = 0.45;
    successSound.volume = 0.8;
    luckyRollSound.volume = 0.8;

    var colors = ['red','orange','yellow','green','blue','purple'];

    function secureRandom(){
        var a = new Uint32Array(1);
        crypto.getRandomValues(a);
        return a[0];
    }

    function randInt(max){
        return secureRandom() % max;
    }

    var rollCount = 0;
    var nextLuckyRoll = 6 + randInt(19);
    var luckyPending = false;

    function pickColors(isLucky){
        var result = [];
        for(var k = 0; k < 4; k++){
            result.push(colors[randInt(colors.length)]);
        }
        if(isLucky){
            var unique = {};
            for(var u = 0; u < result.length; u++) unique[result[u]] = true;
            if(Object.keys(unique).length < 4){
                if(secureRandom() % 100 < 15){
                    var shuffled = colors.slice();
                    for(var i = shuffled.length - 1; i > 0; i--){
                        var j = randInt(i + 1);
                        var tmp = shuffled[i];
                        shuffled[i] = shuffled[j];
                        shuffled[j] = tmp;
                    }
                    return shuffled.slice(0, 4);
                }
            }
        }
        return result;
    }

    function shake(){
        dice.forEach(function(d){
            d.style.background = '#d9d9d9';
            d.style.transform = 'rotate(' + randInt(360) + 'deg)';
        });
    }

    function setFinalColors(chosen){
        dice.forEach(function(d, i){
            d.style.background = chosen[i];
            d.style.transform = 'rotate(0deg)';
        });
    }

    function setDiceBlack(){
        dice.forEach(function(d){
            d.style.background = '#111';
            d.style.transform = 'rotate(0deg)';
        });
    }

    function showLuckyBanner(){
        infoSection.classList.add('hidden');
        luckyBannerTop.style.display = 'block';
        luckyBannerTop.style.animation = 'none';
        luckyBannerTop.offsetHeight;
        luckyBannerTop.style.animation = 'luckyPopIn 0.5s ease-out forwards, luckyPulse 0.8s ease-in-out 0.5s infinite';
    }

    function hideLuckyBanner(){
        luckyBannerTop.style.display = 'none';
        infoSection.classList.remove('hidden');
    }

    function fadeOutRollSound(){
        return new Promise(function(resolve){
            var fade = setInterval(function(){
                if(rollSound.volume > 0.05){
                    rollSound.volume -= 0.05;
                } else {
                    clearInterval(fade);
                    rollSound.pause();
                    rollSound.currentTime = 0;
                    rollSound.volume = 0.45;
                    resolve();
                }
            }, 30);
        });
    }

    async function roll(){
        luckyBanner.style.display = 'none';

        if(luckyPending){
            luckyPending = false;

            rollSound.pause();
            rollSound.currentTime = 0;
            rollSound.play();

            for(var i = 0; i < 12; i++){
                shake();
                await new Promise(function(r){ setTimeout(r, 60); });
            }

            var chosen = pickColors(true);
            setFinalColors(chosen);

            successSound.currentTime = 0;
            successSound.play();
            fadeOutRollSound();

            hideLuckyBanner();

            rollCount = 0;
            nextLuckyRoll = 6 + randInt(19);
            return;
        }

        rollCount++;
        var isLucky = (rollCount >= nextLuckyRoll);

        rollSound.pause();
        rollSound.currentTime = 0;
        rollSound.play();

        for(var i = 0; i < 12; i++){
            shake();
            await new Promise(function(r){ setTimeout(r, 60); });
        }

        if(isLucky){
            setDiceBlack();
            await fadeOutRollSound();
            showLuckyBanner();
            luckyPending = true;
            luckyRollSound.currentTime = 0;
            luckyRollSound.play();
            return;
        }

        var chosen = pickColors(false);
        setFinalColors(chosen);

        successSound.currentTime = 0;
        successSound.play();
        fadeOutRollSound();
    }

    rollBtn.addEventListener('click', roll);
    roll();

    var themeColors = {
        blue: '#0a3d91',
        green: '#0d5c2e',
        red: '#8b1a1a',
        black: '#0b0b0b',
        bronze: '#6b3a2a',
        silver: '#71797E',
        gold: '#8B7500'
    };

    var themeSelect = document.getElementById('themeSelect');
    var savedTheme = localStorage.getItem('meowl-theme') || 'black';
    applyTheme(savedTheme);

    themeSelect.addEventListener('change', function(){
        applyTheme(themeSelect.value);
    });

    function applyTheme(name){
        document.body.style.setProperty('--theme-bg', themeColors[name] || themeColors.black);
        themeSelect.value = name;
        localStorage.setItem('meowl-theme', name);
    }
})();
</script>

</body>
</html>
